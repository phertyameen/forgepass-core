name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/api, apps/web, docs]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci
      - name: Lint — ${{ matrix.workspace }}
        run: npm run lint --workspace=${{ matrix.workspace }} --if-present
      - name: Typecheck — ${{ matrix.workspace }}
        run: npm run typecheck --workspace=${{ matrix.workspace }} --if-present
      - name: Test — ${{ matrix.workspace }}
        run: npm run test --workspace=${{ matrix.workspace }} --if-present

  build:
    name: Build all workspaces
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build all workspaces
        run: npm run build
